version: "3.9"

services:
  nfc-fsanchez:
    container_name: nfc-fsanchez
    image: ghcr.io/francocsanchez/nfc-fsanchez:latest
    restart: unless-stopped
    ports:
      - "32768:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_MONGO: ${DATABASE_MONGO}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
